services:
  route53-ddns:
    container_name: route53-ddns
    image: sbwise/route53-ddns
    restart: unless-stopped
    environment:
      R53_HOST: "home"            # Subdomain/hostname; use "@" or omit for the apex record
      R53_DOMAIN: "example.com"   # Hosted zone domain name
      R53_HOSTED_ZONE_ID: ""      # Optional; looked up by domain when empty
      R53_TTL: "300"              # Optional; record TTL in seconds
      R53_POLL_INTERVAL: "15m"    # Optional; how often to reconcile (e.g. 15m, 5m, 30s)
      # AWS credentials are read from the default credential chain.
      # For local use, provide them via env or a mounted ~/.aws config.
      AWS_REGION: "us-east-1"
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""
