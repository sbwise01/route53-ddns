---
apiVersion: v1
kind: Namespace
metadata:
  name: route53-ddns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: route53-ddns
  namespace: route53-ddns
  annotations:
    # IRSA: the IAM role this service account assumes. The role's trust policy
    # must allow this namespace/serviceaccount, and the role needs permission to
    # list hosted zones and change record sets in the target zone, e.g.:
    #   route53:ListHostedZonesByName
    #   route53:ListResourceRecordSets
    #   route53:ChangeResourceRecordSets
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/route53-ddns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: route53-ddns
  namespace: route53-ddns
spec:
  selector:
    matchLabels:
      app: route53-ddns
  template:
    metadata:
      labels:
        app: route53-ddns
    spec:
      serviceAccountName: route53-ddns
      containers:
      - name: route53-ddns
        image: sbwise/route53-ddns:1.0.0
        resources:
          limits:
            memory: '64Mi'
            cpu: '50m'
        env:
        - name: R53_HOST
          value: 'home'
        - name: R53_DOMAIN
          value: 'bradandmarsha.com'
        # Optional: pin the hosted zone ID to skip the lookup-by-domain call.
        # - name: R53_HOSTED_ZONE_ID
        #   value: 'Z0123456789ABCDEFGHIJ'
        # Optional: record TTL in seconds (defaults to 300).
        # - name: R53_TTL
        #   value: '300'
        # Optional: how often to reconcile (defaults to 15m). e.g. 15m, 5m, 30s.
        # - name: R53_POLL_INTERVAL
        #   value: '15m'
        # AWS region is required by the SDK; us-east-1 works for the global
        # Route53 endpoint.
        - name: AWS_REGION
          value: 'us-east-1'
